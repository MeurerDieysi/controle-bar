<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍻 Controle de Estoque - Bar</title>
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--accent:#3b82f6;--text:#f1f5f9;--muted:#94a3b8;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444}
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu}
    body{background:var(--bg);color:var(--text)}
    header{padding:16px;text-align:center;background:linear-gradient(90deg,#1e293b,#0f172a);border-bottom:1px solid #334155}
    h1{font-size:20px;color:var(--accent)}
    nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:12px;background:#111827;position:sticky;top:0;z-index:10}
    nav button{padding:8px 14px;border:none;border-radius:8px;background:#1f2937;color:var(--text);cursor:pointer;font-weight:600}
    nav button.active{background:var(--accent)}
  .container{max-width:1000px;margin:20px auto;padding:0 12px}
  .card{background:var(--card);border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    h2{margin-bottom:12px;color:var(--accent);font-size:18px}
  .grid{display:grid;gap:10px}
    @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
    input,select,button{padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:var(--text);font-size:14px}
    button{cursor:pointer;background:var(--accent);font-weight:700;border:none}
    button:hover{filter:brightness(1.1)}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #334155}
    th{color:var(--muted);font-weight:600}
  .badge{padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
  .ok{background:rgba(34,197,94,.2);color:var(--ok)}
  .low{background:rgba(245,158,11,.2);color:var(--warn)}
  .entrada{background:rgba(34,197,94,.2);color:var(--ok)}
  .saida{background:rgba(239,68,68,.2);color:var(--danger)}
  .btn-edit{background:#475569;padding:4px 8px;font-size:12px}
  .btn-alert{background:var(--danger)}
  .total-box{background:#0b1220;border:1px solid #334155;padding:12px;border-radius:8px;margin:10px 0;font-weight:700;text-align:center}
  .section{display:none}
  .section.active{display:block}
  .sincro{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;}
  </style>
</head>
<body>
<header><h1>🍻 Controle de Estoque Bar dos Manos</h1></header>

<nav>
  <button class="active" onclick="mostrarSecao('cadastro', event)">Cadastro</button>
  <button onclick="mostrarSecao('movimentar', event)">Movimentar</button>
  <button onclick="mostrarSecao('estoque', event)">Estoque</button>
  <button onclick="mostrarSecao('historico', event)">Histórico</button>
  <button onclick="mostrarSecao('vendas', event)">Vendas</button>
</nav>

<div class="container">
  <div id="cadastro" class="section active">
    <div class="card">
      <h2>Cadastrar Produto</h2>
      <div class="grid">
        <input id="nome" placeholder="Nome do produto - ex: Coca 350ml">
        <input id="estoque" type="number" placeholder="Estoque inicial">
        <input id="minimo" type="number" placeholder="Estoque mínimo pra alerta">
      </div>
      <button onclick="cadastrar()">Adicionar Produto</button>
    </div>
  </div>

  <div id="movimentar" class="section">
    <div class="card">
      <h2>Movimentar Estoque</h2>
      <div class="grid">
        <select id="produto"></select>
        <select id="tipo">
          <option value="entrada">Entrada - Compra/Reposição</option>
          <option value="saida">Saída - Venda/Consumo</option>
        </select>
        <input id="qtd" type="number" placeholder="Quantidade">
      </div>
      <button onclick="movimentar()">Registrar</button>
    </div>
  </div>

  <div id="estoque" class="section">
    <div class="card">
      <h2>Estoque Atual</h2>
      <table id="tabela">
        <thead><tr><th>Produto</th><th>Estoque</th><th>Mínimo</th><th>Status</th><th>Ação</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="historico" class="section">
    <div class="card">
      <h2>Histórico de Movimentações</h2>
      <button class="btn-alert" onclick="zerarHistorico()">Zerar Histórico</button>
      <table id="historicoTable">
        <thead><tr><th>Data/Hora</th><th>Produto</th><th>Tipo</th><th>Qtd</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="vendas" class="section">
    <div class="card">
      <h2>Vendas por Dia</h2>
      <div class="grid">
        <input type="date" id="filtroData" onchange="atualizarVendasDia()">
        <button onclick="exportarExcel()">Exportar Excel</button>
        <button onclick="limparFiltro()">Mostrar Tudo</button>
      </div>
      <div class="total-box">Total vendido no dia: <span id="totalDia">0</span> unidades</div>
      <table id="vendasDia">
        <thead><tr><th>Data</th><th>Produto</th><th>Total Vendido</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="sincro">Sincronizando em tempo real...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhgpVrA6Idal5jxedEE1f8_hwx6zfrxMM",
    authDomain: "bardosmanos-253d0.firebaseapp.com",
    projectId: "bardosmanos-253d0",
    storageBucket: "bardosmanos-253d0.firebasestorage.app",
    messagingSenderId: "301954418949",
    appId: "1:301954418949:web:2cd1ca3a0ed8ea44fccf6c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const produtosRef = collection(db, "produtos");
  const historicoRef = collection(db, "historico");

  let produtos = [];
  let historico = [];

  onSnapshot(produtosRef, (snapshot) => {
    produtos = [];
    snapshot.forEach(docSnap => {
      produtos.push({id: docSnap.id,...docSnap.data()});
    });
    atualizarTabela();
    atualizarVendasDia();
  });

  onSnapshot(historicoRef, (snapshot) => {
    historico = [];
    snapshot.forEach(docSnap => {
      historico.push({id: docSnap.id,...docSnap.data()});
    });
    atualizarHistorico();
    atualizarVendasDia();
  });

  // CORREÇÃO: função agora é global pra HTML conseguir chamar
  window.mostrarSecao = function(id, e){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(e) e.target.classList.add('active');
  }

  function atualizarTabela(){
    const tbody = document.querySelector('#tabela tbody');
    const select = document.getElementById('produto');
    tbody.innerHTML = '';
    select.innerHTML = '<option value="">Selecione o produto</option>';

    produtos.forEach((p)=>{
      const status = p.estoque <= p.minimo? '<span class="badge low">Baixo</span>' : '<span class="badge ok">OK</span>';
      tbody.innerHTML += `<tr>
        <td>${p.nome}</td>
        <td>${p.estoque}</td>
        <td>${p.minimo}</td>
        <td>${status}</td>
        <td>
          <button class="btn-edit" onclick="editarEstoque('${p.id}')">Estoque</button>
          <button class="btn-edit" onclick="editarCadastro('${p.id}')">Cadastro</button>
        </td>
      </tr>`;
      select.innerHTML += `<option value="${p.id}">${p.nome}</option>`;
    });
  }

  function atualizarHistorico(){
    const tbody = document.querySelector('#historicoTable tbody');
    tbody.innerHTML = '';
    historico.slice().reverse().forEach(h=>{
      const badge = h.tipo === 'entrada'? '<span class="badge entrada">Entrada</span>' : '<span class="badge saida">Saída</span>';
      tbody.innerHTML += `<tr>
        <td>${h.data}</td>
        <td>${h.produto}</td>
        <td>${badge}</td>
        <td>${h.qtd}</td>
      </tr>`;
    });
  }

  function atualizarVendasDia(){
    const tbody = document.querySelector('#vendasDia tbody');
    const filtroData = document.getElementById('filtroData').value;
    const vendas = {};
    let totalGeral = 0;

    historico.forEach(h=>{
      if(h.tipo === 'saida'){
        const dataCompleta = h.data.split(' ')[0];
        const [dia, mes, ano] = dataCompleta.split('/');
        const dataISO = `${ano}-${mes.padStart(2,'0')}-${dia.padStart(2,'0')}`;

        if(!filtroData || filtroData === dataISO){
          const chave = dataCompleta + '|' + h.produto;
          vendas[chave] = (vendas[chave] || 0) + h.qtd;
          totalGeral += h.qtd;
        }
      }
    });

    tbody.innerHTML = '';
    Object.keys(vendas).sort().reverse().forEach(chave=>{
      const [data, produto] = chave.split('|');
      tbody.innerHTML += `<tr>
        <td>${data}</td>
        <td>${produto}</td>
        <td>${vendas[chave]}</td>
      </tr>`;
    });

    document.getElementById('totalDia').textContent = totalGeral;

    if(Object.keys(vendas).length === 0){
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8;">Nenhuma venda registrada</td></tr>';
    }
  }

  window.limparFiltro = () => {
    document.getElementById('filtroData').value = '';
    atualizarVendasDia();
  }

  window.exportarExcel = () => {
    const filtroData = document.getElementById('filtroData').value;
    let csv = 'Data,Produto,Quantidade\n';
    let total = 0;

    historico.forEach(h=>{
      if(h.tipo === 'saida'){
        const dataCompleta = h.data.split(' ')[0];
        const [dia, mes, ano] = dataCompleta.split('/');
        const dataISO = `${ano}-${mes.padStart(2,'0')}-${dia.padStart(2,'0')}`;

        if(!filtroData || filtroData === dataISO){
          csv += `${dataCompleta},${h.produto},${h.qtd}\n`;
          total += h.qtd;
        }
      }
    });

    csv += `\nTotal Geral,${total},`;

    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filtroData? `vendas_${filtroData}.csv` : 'vendas_todas.csv';
    a.click();
  }

  window.cadastrar = async () => {
    const nome = document.getElementById('nome').value.trim();
    const estoque = parseInt(document.getElementById('estoque').value);
    const minimo = parseInt(document.getElementById('minimo').value);
    if(!nome || isNaN(estoque) || isNaN(minimo)) return alert('Preencha tudo!');
    await addDoc(produtosRef, {nome, estoque, minimo});
    document.getElementById('nome').value = '';
    document.getElementById('estoque').value = '';
    document.getElementById('minimo').value = '';
    alert('Produto cadastrado!');
  }

  window.movimentar = async () => {
    const id = document.getElementById('produto').value;
    const tipo = document.getElementById('tipo').value;
    const qtd = parseInt(document.getElementById('qtd').value);
    if(!id || isNaN(qtd) || qtd <= 0) return alert('Preencha certo!');

    const produto = produtos.find(p=>p.id===id);
    if(!produto) return;

    let novoEstoque = produto.estoque;
    if(tipo === 'entrada') novoEstoque += qtd;
    else {
      if(produto.estoque < qtd) return alert('Estoque insuficiente!');
      novoEstoque -= qtd;
    }

    await updateDoc(doc(db, "produtos", id), {estoque: novoEstoque});

    const agora = new Date().toLocaleString('pt-BR');
    await addDoc(historicoRef, {data: agora, produto: produto.nome, tipo, qtd});

    document.getElementById('qtd').value = '';
    alert('Movimentação registrada!');
  }

  window.editarEstoque = async (id) => {
    const produto = produtos.find(p=>p.id===id);
    const novoEstoque = prompt(`Novo estoque para ${produto.nome}:`, produto.estoque);
    if(novoEstoque === null) return;
    const val = parseInt(novoEstoque);
    if(isNaN(val) || val < 0) return alert('Valor inválido!');
    await updateDoc(doc(db, "produtos", id), {estoque: val});
  }

  window.editarCadastro = async (id) => {
    const produto = produtos.find(p=>p.id===id);
    const novoNome = prompt(`Novo nome para o produto:`, produto.nome);
    if(novoNome === null) return;
    const novoMinimo = prompt(`Novo estoque mínimo:`, produto.minimo);
    if(novoMinimo === null) return;
    const val = parseInt(novoMinimo);
    if(!novoNome.trim() || isNaN(val) || val < 0) return alert('Valor inválido!');
    await updateDoc(doc(db, "produtos", id), {nome: novoNome.trim(), minimo: val});
  }

  window.zerarHistorico = async () => {
    if(confirm('Tem certeza que quer apagar todo o histórico? Isso não pode ser desfeito.')){
      const deletar = historico.map(h=>deleteDoc(doc(db, "historico", h.id)));
      await Promise.all(deletar);
    }
  }
</script>
</body>
</html>
